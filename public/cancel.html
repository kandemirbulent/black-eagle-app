<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Cancelled | Black Eagle</title>
  <style>
    body {
      background-color: #f7f9fb;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .cancel-box {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }

    h1 {
      color: #e74c3c;
      margin-bottom: 10px;
    }

    p {
      color: #333;
      font-size: 16px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 25px;
      background-color: #000;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    a:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <div class="cancel-box">
    <h1>❌ Payment Cancelled</h1>
    <p>Your payment was not completed. You can try again later.</p>
    <a href="/payment.html">Try Again</a>
  </div>
</body>
</html>
