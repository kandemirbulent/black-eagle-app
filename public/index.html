<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Eagle Hospitality</title>

  <style>
    body {
      font-family: "Poppins", Arial, sans-serif;
      background: linear-gradient(145deg, #1a1a1a, #2c2c2c);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #fff;
      width: 380px;
      padding: 50px 40px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    img.logo {
      width: 130px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      color: #111;
    }

    input {
      width: 100%;
      padding: 13px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      margin-top: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      background: #d4af37;
      color: #000;
    }

    .links {
      margin-top: 20px;
    }

    .links a {
      display: block;
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 10px;
      border-radius: 8px;
      transition: 0.3s;
    }

    .customer-link {
      color: #111;
      background: #fbc531;
    }

    .customer-link:hover {
      background: #e0a800;
    }

    .staff-link {
      color: #fff;
      background: #333;
    }

    .staff-link:hover {
      background: #000;
    }

    .message {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }

    .message.error {
      color: #b91c1c;
    }

    .message.success {
      color: #166534;
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="/img/blackeaglelogo.png" class="logo" alt="Black Eagle Logo">

    <h1>Login to Black Eagle</h1>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button id="loginBtn" onclick="login()">Login</button>

    <div class="links">
      <a href="/Customer-logins/customer-login-create.html" class="customer-link">
        Create Customer Account
      </a>

      <a href="/staff-logins/staff-login-create.html" class="staff-link">
        Create Staff Account
      </a>
    </div>

    <div id="messageBox" class="message"></div>
  </div>

  <script>
    const messageBox = document.getElementById("messageBox");
    const loginBtn = document.getElementById("loginBtn");

    function setMessage(message, type = "error") {
      messageBox.textContent = message;
      messageBox.className = "message " + type;
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "Logging in..." : "Login";
    }

    async function login() {
      const email = document.getElementById("email").value.trim().toLowerCase();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        setMessage("Enter email and password", "error");
        return;
      }

      try {
        setLoading(true);
        setMessage("");

        // 1) ÖNCE CUSTOMER DENE
        const customerRes = await fetch("/customer-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const customerData = await customerRes.json().catch(() => ({}));

        if (customerRes.ok && customerData.success) {
          localStorage.setItem("customerEmail", email);

          if (customerData.customer?.name) {
            localStorage.setItem("customerName", customerData.customer.name);
          }

          setMessage("Customer login successful. Redirecting...", "success");

          setTimeout(() => {
            window.location.href =
              `/Customer-logins/customer-dashboard.html?appId=${customerData.customer.applicationId}`;
          }, 500);

          return;
        }

        // 2) CUSTOMER DEĞİLSE STAFF DENE
        const staffRes = await fetch("/api/staff/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const staffData = await staffRes.json().catch(() => ({}));

        if (staffRes.ok && staffData.success) {
          localStorage.setItem("staffEmail", email);

          if (staffData.staff?.name) {
            localStorage.setItem("staffName", staffData.staff.name);
          }

          setMessage("Staff login successful. Redirecting...", "success");

          setTimeout(() => {
            const redirectUrl = staffData.redirect || "/staff-logins/staff-dashboard.html";
            window.location.href = redirectUrl + "?email=" + encodeURIComponent(email);
          }, 500);

          return;
        }

        // 3) HİÇBİRİ DEĞİLSE
        const finalMessage =
          customerData.message ||
          staffData.message ||
          "User not found or password incorrect.";

        setMessage(finalMessage, "error");
        setLoading(false);

      } catch (err) {
        console.error(err);
        setMessage("Server error", "error");
        setLoading(false);
      }
    }
  </script>
</body>
</html>
