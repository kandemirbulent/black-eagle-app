<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Eagle App</title>
  <style>
    body {
      font-family: "Poppins", Arial, sans-serif;
      background: linear-gradient(145deg, #1a1a1a, #2c2c2c);
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #fff;
      width: 360px;
      padding: 45px 40px;
      border-radius: 18px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      text-align: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .container:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.3);
    }

    img.logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 12px;
    }

    h1 {
      color: #111;
      font-size: 22px;
      margin-bottom: 25px;
      font-weight: 600;
    }

    .section-title {
      color: #444;
      font-size: 15px;
      font-weight: 600;
      margin-top: 30px;
      margin-bottom: 10px;
      border-top: 1px solid #ddd;
      padding-top: 12px;
      letter-spacing: 0.4px;
    }

    .btn {
      width: 100%;
      padding: 12px 0;
      background-color: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      margin: 8px 0;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }

    .btn:hover {
      background-color: #d4af37;
      color: #000;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.25);
      transform: scale(1.02);
    }

    footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
    }

    @media (max-width: 450px) {
      .container {
        width: 90%;
        padding: 35px 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- LOGO -->
    <img src="public/img/logo.png" alt="Black Eagle Logo" class="logo" onerror="this.style.display='none'">

    <h1>Welcome to Black Eagle App</h1>

    <!-- CUSTOMER SECTION -->
    <div class="section-title">Customer</div>
    <button class="btn" onclick="window.location.href='Customer-logins/customer-login.html'">
      Customer Login
    </button>
    <button class="btn" onclick="window.location.href='Customer-logins/customer-login-create.html'">
      Create Customer Account
    </button>

    <!-- STAFF SECTION -->
    <div class="section-title">Staff</div>
    <button class="btn" onclick="window.location.href='Staff-logins/staff-login.html'">
      Staff Login
    </button>
    <button class="btn" onclick="window.location.href='Staff-logins/staff-login-create.html'">
      Create Staff Account
    </button>

    <footer>© 2025 Black Eagle Services Ltd</footer>
  </div>
</body>
</html>
