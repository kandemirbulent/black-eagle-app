<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black Eagle App</title>

  <style>
    body {
      font-family: "Poppins", Arial, sans-serif;
      background: linear-gradient(145deg, #1a1a1a, #2c2c2c);
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #fff;
      width: 380px;
      padding: 50px 40px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    /* 🔥 LOGO BÜYÜTÜLDÜ */
    img.logo {
      width: 130px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 25px;
      color: #111;
    }

    input {
      width: 100%;
      padding: 13px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 13px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      margin-top: 12px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      background: #d4af37;
      color: #000;
    }

    .links {
      margin-top: 20px;
    }

    /* 🔥 REGISTER LINKLERİ GÜÇLENDİRİLDİ */
    .links a {
      display: block;
      margin-top: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 10px;
      border-radius: 8px;
      transition: 0.3s;
    }

    /* Customer kayıt */
    .customer-link {
      color: #111;
      background: #fbc531;
    }

    .customer-link:hover {
      background: #e0a800;
    }

    /* Staff kayıt */
    .staff-link {
      color: #fff;
      background: #333;
    }

    .staff-link:hover {
      background: #000;
    }

  </style>
</head>

<body>
  <div class="container">

    <!-- 🔥 LOGO (PATH DÜZELT) -->
    <img src="/img/blackeaglelogo.png" class="logo" alt="Black Eagle Logo">

    <h1>Login to Black Eagle</h1>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <button onclick="login()">Login</button>

    <div class="links">
      <a href="/Customer-logins/customer-login-create.html" class="customer-link">
        Create Customer Account
      </a>

      <a href="/Staff-logins/staff-login-create.html" class="staff-link">
        Create Staff Account
      </a>
    </div>

  </div>

  <script>
    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (!email || !password) {
        alert("Enter email and password");
        return;
      }

      try {
        const res = await fetch("/customer-login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password }),
        });

        const data = await res.json();

        if (!data.success) {
          alert(data.message || "Login failed");
          return;
        }

        window.location.href =
          `/Customer-logins/customer-dashboard.html?appId=${data.customer.applicationId}`;

      } catch (err) {
        console.error(err);
        alert("Server error");
      }
    }
  </script>
</body>
</html>
