<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Registration | Black Eagle</title>
  <style>
    :root {
      --bg: #0a0d12;
      --bg-soft: #101723;
      --panel: rgba(12, 17, 24, 0.8);
      --panel-soft: rgba(19, 26, 36, 0.95);
      --text: #f5f0e5;
      --muted: #b8c0ce;
      --gold: #d3ae56;
      --gold-strong: #f0c96a;
      --gold-soft: rgba(211, 174, 86, 0.15);
      --border: rgba(255, 255, 255, 0.08);
      --field-border: rgba(255, 255, 255, 0.1);
      --field-bg: rgba(255, 255, 255, 0.03);
      --card-bg: rgba(14, 19, 28, 0.96);
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Manrope", Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(211, 174, 86, 0.16), transparent 32%),
        radial-gradient(circle at right 20%, rgba(72, 110, 151, 0.18), transparent 22%),
        linear-gradient(180deg, #0a0d12 0%, #0d1219 45%, #101620 100%);
      margin: 0;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text);
      overflow-x: hidden;
      position: relative;
      color-scheme: dark;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent 85%);
      opacity: 0.25;
    }

    .form-container {
      position: relative;
      z-index: 1;
      background:
        radial-gradient(circle at top right, rgba(211, 174, 86, 0.18), transparent 34%),
        linear-gradient(180deg, var(--panel-soft), var(--card-bg));
      width: 400px;
      padding: 35px 40px;
      border-radius: 28px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    h1 {
      text-align: center;
      color: var(--text);
      margin-bottom: 25px;
      font-size: 22px;
      font-weight: 600;
    }

    form {
      display: flex;
      flex-direction: column;
    }

    label {
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 5px;
      font-size: 14px;
    }

    input {
      padding: 15px 16px;
      margin-bottom: 15px;
      border: 1px solid var(--field-border);
      border-radius: 16px;
      font-size: 14px;
      width: 100%;
      background: var(--field-bg);
      color: var(--text);
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus {
      outline: none;
      border-color: rgba(211, 174, 86, 0.48);
      box-shadow: 0 0 0 4px rgba(211, 174, 86, 0.12);
      background: rgba(255, 255, 255, 0.04);
    }

    .btn {
      background: linear-gradient(135deg, var(--gold), var(--gold-strong));
      color: #16110a;
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 5px;
      letter-spacing: 0.01em;
      box-shadow: 0 14px 40px rgba(211, 174, 86, 0.26);
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: var(--field-bg);
      color: var(--text);
      border: 1px solid var(--field-border);
      box-shadow: none;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      transform: translateY(-2px);
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      margin-top: 20px;
    }

    /* ===== Modal Styling ===== */
    .modal {
      display: none;
      position: fixed;
      z-index: 10;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.72);
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.3s ease;
      padding: 20px;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      background:
        radial-gradient(circle at top right, rgba(211, 174, 86, 0.18), transparent 34%),
        linear-gradient(180deg, var(--panel-soft), var(--card-bg));
      padding: 35px 30px;
      border-radius: 28px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: var(--shadow);
      position: relative;
      border: 1px solid var(--border);
    }

    .modal-content h2 {
      margin-bottom: 15px;
      color: var(--text);
      font-size: 20px;
      font-weight: 600;
    }

    .modal-content p {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .modal-content a {
      color: var(--gold-strong);
      text-decoration: none;
      font-weight: 600;
    }

    .modal-content a:hover {
      text-decoration: underline;
    }

    .agree-section {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
    }

    .agree-section input {
      transform: scale(1.3);
      cursor: pointer;
      accent-color: var(--gold);
    }

    .modal-content button {
      background: linear-gradient(135deg, var(--gold), var(--gold-strong));
      color: #16110a;
      border: none;
      padding: 14px 22px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      margin-top: 25px;
      box-shadow: 0 14px 40px rgba(211, 174, 86, 0.26);
      transition: 0.3s ease;
    }

    .modal-content button:disabled {
      background: rgba(255, 255, 255, 0.18);
      color: rgba(245, 240, 229, 0.7);
      cursor: not-allowed;
    }

    .modal-content button:hover:enabled {
      background: linear-gradient(135deg, var(--gold-strong), #ffd77d);
    }
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Customer Registration</h1>
    <form id="registerForm">
      <label>Company Name *</label>
      <input type="text" name="companyName" required>

      <label>Company Address *</label>
      <input type="text" name="companyAddress" required>

      <label>Postcode *</label>
      <input type="text" name="postcode" required>

      <label>First Name *</label>
      <input type="text" name="firstName" required>

      <label>Last Name *</label>
      <input type="text" name="lastName" required>

      <label>Mobile Phone *</label>
      <input type="tel" name="mobilePhone" required>

      <label>Email *</label>
      <input type="email" name="email" required>

      <label>Website</label>
      <input type="text" name="website">

      <label>VAT Number (optional)</label>
      <input type="text" name="vatNumber" pattern="^GB[0-9]{9,12}$" title="Format: GB followed by 9–12 digits" placeholder="e.g. GB123456789">

      <label>Company House Number / UTR Number *</label>
      <input type="text" name="companyNumber" required pattern="[A-Za-z0-9]+" title="Enter your Company House or UTR Number">

      <button type="submit" class="btn">Submit</button>
      <button type="button" class="btn btn-secondary" onclick="window.history.back()">Back</button>
    </form>
    <footer>© 2025 Black Eagle Services Ltd</footer>
  </div>

  <!-- ===== Modal Popup ===== -->
  <div class="modal" id="termsModal">
    <div class="modal-content">
      <h2>Terms Agreement</h2>
      <p>
        Before completing your registration, please review and agree to our 
        <a href="../terms.html" target="_blank">Terms & Conditions</a>.
      </p>
      <div class="agree-section">
        <input type="checkbox" id="agreeBox">
        <label for="agreeBox">I have read and agree to the Terms & Conditions.</label>
      </div>

      <!-- ✅ SADECE BURASI: type="button" eklendi -->
      <button id="confirmSubmit" type="button" disabled>Confirm and Submit</button>
    </div>
  </div>

  <script>
    const form = document.getElementById("registerForm");
    const modal = document.getElementById("termsModal");
    const agreeBox = document.getElementById("agreeBox");
    const confirmBtn = document.getElementById("confirmSubmit");

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      modal.style.display = "flex";
    });

    agreeBox.addEventListener("change", () => {
      confirmBtn.disabled = !agreeBox.checked;
    });

    // ✅ FIX: JSON gelmezse patlamasın + success alanına bağlı kalmasın
    async function handleConfirmSubmit() {
      modal.style.display = "none";
      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      data.agreedTerms = true;
      data.status = "pending";

      try {
        const res = await fetch("/register-customer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        // ✅ Önce text al, sonra JSON parse et (JSON değilse hata yakala)
        const raw = await res.text();
        let result = {};
        try {
          result = raw ? JSON.parse(raw) : {};
        } catch (e) {
          alert("❌ Server response not valid. Please contact support.");
          console.log("Server response (not JSON):", raw);
          return;
        }

        // ✅ En kritik düzeltme: result.success şartını kaldırdık (DB değişince format değişmiş olabilir)
        if (res.ok) {
          const appId = result.applicationId || result.id || "N/A";

          document.body.innerHTML = `
            <div style="background:#fff;padding:40px;border-radius:12px;text-align:center;max-width:500px;margin:100px auto;box-shadow:0 0 15px rgba(0,0,0,0.2)">
              <h2>✅ Thank you!</h2>
              <p>Your registration has been received and is now pending approval.<br><br>
              <strong>Your Application ID:</strong> ${appId}<br>
              Please keep this number safe.<br><br>
              You will receive an email once your account is approved by the Black Eagle Team.</p>
              <button id="okBtn" style="background:#000;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-size:15px;">OK</button>
            </div>`;

          const okBtn = document.getElementById("okBtn");
          okBtn.addEventListener("click", () => {
            try {
              window.close();
              setTimeout(() => {
                if (!window.closed) {
                  window.location.href = "/Customer-logins/customer-login.html";
                }
              }, 300);
            } catch (err) {
              window.location.href = "/Customer-logins/customer-login.html";
            }
          });
        } else {
          alert("❌ " + (result.message || "Error submitting registration."));
        }
      } catch (err) {
        alert("❌ Server error. Please try again later.");
        console.error(err);
      }
    }

    confirmBtn.addEventListener("click", handleConfirmSubmit);
    
  </script>
</body>
</html>
