<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Your Password | Black Eagle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h2 { color: #222; margin-bottom: 10px; }
    p { color: #555; margin-bottom: 25px; }
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
    }
    button {
      width: 100%;
      background: #fbc531;
      color: #111;
      border: none;
      padding: 10px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover { background: #e1b12c; }
    .message {
      margin-top: 15px;
      font-size: 14px;
      color: #28a745;
      min-height: 20px;
    }
    .error { color: #e84118; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create Your Password</h2>
    <p>Enter your new password below to activate your Black Eagle account.</p>
    <form id="setPasswordForm">
      <input type="password" id="password" placeholder="Enter new password" required />
      <input type="password" id="confirmPassword" placeholder="Confirm password" required />
      <button type="submit">Save Password</button>
    </form>
    <div id="message" class="message"></div>
  </div>

  <script>
    const form = document.getElementById('setPasswordForm');
    const msg = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.textContent = '';

      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const password = document.getElementById('password').value.trim();
      const confirm = document.getElementById('confirmPassword').value.trim();

      if (!token) {
        msg.innerHTML = "<span class='error'>❌ Invalid or expired link.</span>";
        return;
      }

      if (password.length < 6) {
        msg.innerHTML = "<span class='error'>⚠️ Password must be at least 6 characters long.</span>";
        return;
      }

      if (password !== confirm) {
        msg.innerHTML = "<span class='error'>❌ Passwords do not match.</span>";
        return;
      }

      msg.textContent = "⏳ Setting password...";
      msg.style.color = "#333";

      try {
        const response = await fetch('/set-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });

        const result = await response.json();

        msg.textContent = result.message;
        msg.style.color = result.success ? 'green' : 'red';

        // ✅ Başarılı ise login sayfasına yönlendir
        if (result.success && result.redirect) {
          setTimeout(() => {
            window.location.href = result.redirect;
          }, 2000);
        }

        // ❌ Geçersiz token ise forgot-password sayfasına yönlendir
        else if (!result.success && result.redirect) {
          setTimeout(() => {
            window.location.href = result.redirect;
          }, 2500);
        }
      } catch (err) {
        console.error('❌ Fetch error:', err);
        msg.innerHTML = "<span class='error'>❌ Server error. Please try again later.</span>";
      }
    });
  </script>
</body>
</html>
