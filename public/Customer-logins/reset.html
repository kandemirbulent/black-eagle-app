<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customer Reset Password</title>
</head>
<body>
  <h2>Set a New Password</h2>
  <form id="resetForm">
    <input type="hidden" id="token">
    <input type="hidden" id="email">

    <label for="newPassword">New Password:</label><br>
    <input type="password" id="newPassword" required minlength="6"><br><br>

    <button type="submit">Update Password</button>
  </form>

  <p id="msg"></p>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("token").value = params.get("token");
    document.getElementById("email").value = params.get("email");

    document.getElementById("resetForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const token = document.getElementById("token").value;
      const email = document.getElementById("email").value;
      const newPassword = document.getElementById("newPassword").value;
      const msg = document.getElementById("msg");

      try {
        const res = await fetch("/customer-reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, email, newPassword }),
        });

        const data = await res.json().catch(() => ({}));
        msg.innerText = data.message || "Password update completed.";

        if (data.success && data.redirect) {
          setTimeout(() => {
            window.location.href = data.redirect;
          }, 1000);
        }
      } catch (err) {
        console.error("Reset password error:", err);
        msg.innerText = "Could not update password. Please try again.";
      }
    });
  </script>
</body>
</html>
