<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Password | Black Eagle</title>
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-container {
      background: #fff;
      color: #111;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      width: 400px;
      text-align: center;
    }
    h1 {margin-bottom: 20px;}
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      background: #fbc531;
      color: #111;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {background: #d4a700;}
  </style>
</head>
<body>
  <div class="form-container">
    <h1>Create Your Password</h1>
    <input type="password" id="password" placeholder="Enter new password" />
    <input type="password" id="confirmPassword" placeholder="Confirm password" />
    <button onclick="setPassword()">Set Password</button>
    <p id="message" style="margin-top:10px; font-size:14px;"></p>
  </div>

  <script>
    async function setPassword() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const msg = document.getElementById('message');

      if (password !== confirm) {
        msg.textContent = "❌ Passwords do not match.";
        msg.style.color = "red";
        return;
      }

      const res = await fetch('/set-password', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ token, password })
      });

      const text = await res.text();
      msg.textContent = text.includes('success') ? "✅ Password created successfully! You can now log in." : text;
      msg.style.color = text.includes('success') ? "green" : "red";
    }
  </script>
</body>
</html>
