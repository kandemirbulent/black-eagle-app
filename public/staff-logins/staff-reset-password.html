<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Reset Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #111827;
    }

    .card {
      width: min(440px, calc(100vw - 32px));
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: #4b5563;
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: #fff;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status {
      min-height: 22px;
      margin-top: 16px;
      font-size: 14px;
    }

    .status.error {
      color: #b91c1c;
    }

    .status.success {
      color: #047857;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Set a New Staff Password</h1>
    <p>Choose a new password for your staff account.</p>

    <form id="resetForm">
      <label for="email">Staff Email</label>
      <input type="email" id="email" required autocomplete="email">

      <label for="password">New Password</label>
      <input type="password" id="password" required minlength="6" autocomplete="new-password">

      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">

      <button type="submit" id="submitBtn">Update Password</button>
    </form>

    <div id="status" class="status"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token") || "";
    const emailFromQuery = params.get("email") || "";

    const form = document.getElementById("resetForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("status");

    emailInput.value = emailFromQuery;

    function setStatus(message, type = "") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "Updating..." : "Update Password";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (!token) {
        setStatus("Missing reset token. Please request a new staff reset link.", "error");
        return;
      }

      if (!email) {
        setStatus("Email is required.", "error");
        return;
      }

      if (!password || !confirmPassword) {
        setStatus("Please fill in both password fields.", "error");
        return;
      }

      if (password.length < 6) {
        setStatus("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        setStatus("Passwords do not match.", "error");
        return;
      }

      try {
        setLoading(true);
        setStatus("");

        const res = await fetch("/api/staff/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, email, password }),
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          setStatus(data.message || "Failed to update password.", "error");
          return;
        }

        setStatus(data.message || "Password updated successfully.", "success");

        if (data.redirect) {
          setTimeout(() => {
            window.location.href = data.redirect;
          }, 1000);
        }
      } catch (error) {
        console.error("Staff reset password error:", error);
        setStatus("Could not update password. Please try again.", "error");
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
