<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate Account</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #eef0f3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 92%;
      max-width: 450px;
      background: white;
      padding: 25px 20px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #333;
    }

    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .form-label {
      display: flex;
      flex-direction: column;
      font-size: 0.9rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 12px;
    }

    input {
      margin-top: 5px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      background: #fafafa;
    }

    input:focus {
      border-color: #007bff;
      outline: none;
      box-shadow: 0 0 4px rgba(0,123,255,0.4);
    }

    .button {
      width: 100%;
      padding: 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 15px;
    }

    .button:hover {
      background: #005fcc;
    }

    .button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      text-align: center;
      color: #666;
    }

    .status.error {
      color: #b91c1c;
    }

    .status.ok {
      color: #166534;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Activate Your Account</h1>
    <div class="subtitle">
      Create your password to activate your staff account.
    </div>

    <label class="form-label">Email:
      <input type="email" id="email" readonly>
    </label>

    <label class="form-label">Create Password:
      <input type="password" id="password" required>
    </label>

    <label class="form-label">Confirm Password:
      <input type="password" id="confirmPassword" required>
    </label>

    <hr style="margin: 20px 0; opacity: 0.4;">

    <h1 style="font-size:1.3rem;">Bank Details</h1>

    <label class="form-label">Account Holder Name:
      <input type="text" id="accountHolder">
    </label>

    <label class="form-label">Bank Name:
      <input type="text" id="bankName">
    </label>

    <label class="form-label">Sort Code:
      <input type="text" id="sortCode">
    </label>

    <label class="form-label">Account Number:
      <input type="text" id="accountNumber">
    </label>

    <label class="form-label">IBAN (optional):
      <input type="text" id="iban">
    </label>

    <button class="button" id="activateBtn">Complete Activation</button>

    <div id="status" class="status"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const emailFromQuery = params.get("email");
    const tokenFromQuery = params.get("token");

    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const confirmPasswordInput = document.getElementById("confirmPassword");
    const activateBtn = document.getElementById("activateBtn");
    const statusBox = document.getElementById("status");

    emailInput.value = emailFromQuery || "";

    function setStatus(message, type = "") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    function setLoading(isLoading) {
      activateBtn.disabled = isLoading;
      activateBtn.textContent = isLoading ? "Activating..." : "Complete Activation";
    }

    activateBtn.addEventListener("click", async function () {
      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      const accountHolder = document.getElementById("accountHolder").value.trim();
      const bankName = document.getElementById("bankName").value.trim();
      const sortCode = document.getElementById("sortCode").value.trim();
      const accountNumber = document.getElementById("accountNumber").value.trim();
      const iban = document.getElementById("iban").value.trim();

      if (!email) {
        setStatus("Missing email. Please go back to the verification page.", "error");
        return;
      }

      if (!tokenFromQuery) {
        setStatus("Missing activation link. Please verify your email again.", "error");
        return;
      }

      if (!password || !confirmPassword) {
        setStatus("Please fill in both password fields.", "error");
        return;
      }

      if (password.length < 6) {
        setStatus("Password must be at least 6 characters.", "error");
        return;
      }

      if (password !== confirmPassword) {
        setStatus("Passwords do not match.", "error");
        return;
      }

      const activationData = {
        email: email,
        password: password,
        token: tokenFromQuery,
        bank_details: {
          account_holder: accountHolder,
          bank_name: bankName,
          sort_code: sortCode,
          account_number: accountNumber,
          iban: iban
        }
      };

      try {
        setLoading(true);
        setStatus("");

        const res = await fetch("/api/staff/set-password", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(activationData)
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          setStatus(data.message || "Failed to activate account.", "error");
          setLoading(false);
          return;
        }

        setStatus(data.message || "Activation completed successfully. Redirecting to login...", "ok");

        setTimeout(() => {
          window.location.href = "/staff-logins/staff-login.html";
        }, 1500);

      } catch (error) {
        console.error("Activation error:", error);
        setStatus("Server connection failed.", "error");
        setLoading(false);
      }
    });
  </script>

</body>
</html>
