<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login</title>
  <style>
    :root {
      --bg: #0a0d12;
      --bg-soft: #101723;
      --panel: rgba(12, 17, 24, 0.92);
      --panel-soft: rgba(19, 27, 39, 0.96);
      --text: #f5f0e5;
      --muted: #b8c0ce;
      --gold: #d3ae56;
      --gold-strong: #f0c96a;
      --border: rgba(255, 255, 255, 0.08);
      --danger: #ff9f9f;
      --success: #9ae8b2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(211, 174, 86, 0.18), transparent 30%),
        linear-gradient(160deg, var(--bg) 0%, #101823 52%, #090c11 100%);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text);
    }

    form {
      background: linear-gradient(180deg, var(--panel-soft), var(--panel));
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.42);
      width: 100%;
      max-width: 400px;
      border: 1px solid rgba(211, 174, 86, 0.18);
    }

    h1 {
      text-align: center;
      color: var(--text);
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
      color: var(--muted);
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 15px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--text);
    }

    input:focus {
      outline: none;
      border-color: rgba(240, 201, 106, 0.75);
      box-shadow: 0 0 0 3px rgba(211, 174, 86, 0.18);
      background: rgba(255, 255, 255, 0.06);
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      flex: 1;
      border: 1px solid transparent;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .buttons button:first-child {
      background: linear-gradient(135deg, var(--gold), var(--gold-strong));
      color: #15110a;
    }

    .buttons button:first-child:hover {
      background: linear-gradient(135deg, var(--gold-strong), #ffd77d);
      transform: translateY(-1px);
    }

    .buttons button:last-child {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-color: var(--border);
    }

    .buttons button:last-child:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(211, 174, 86, 0.25);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .error {
      color: var(--danger);
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }

    .success {
      color: var(--success);
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
    }

    a.forgot {
      display: block;
      margin-top: 10px;
      text-align: right;
      color: var(--gold-strong);
      text-decoration: none;
    }

    a.forgot:hover {
      color: #ffe3a6;
    }
  </style>
</head>
<body>
  <form id="staffLoginForm">
    <h1>Staff Login</h1>

    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" required>

    <div class="buttons">
      <button type="submit" id="loginBtn">Login</button>
      <button type="button" onclick="window.history.back()">Back</button>
    </div>

    <a class="forgot" href="/staff-logins/staff-forgot.html">Forgot password?</a>
    <div id="errorMessage" class="error"></div>
  </form>

  <script>
    const form = document.getElementById("staffLoginForm");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const errorDiv = document.getElementById("errorMessage");
    const loginBtn = document.getElementById("loginBtn");

    function setMessage(message, type = "error") {
      errorDiv.textContent = message;
      errorDiv.className = type === "success" ? "success" : "error";
    }

    function setLoading(isLoading) {
      loginBtn.disabled = isLoading;
      loginBtn.textContent = isLoading ? "Logging in..." : "Login";
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = emailInput.value.trim().toLowerCase();
      const password = passwordInput.value.trim();

      setMessage("");

      if (!email || !password) {
        setMessage("⚠️ Please enter both email and password.");
        return;
      }

      try {
        setLoading(true);

        const res = await fetch("/api/staff/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data.success) {
          setMessage(data.message || "Login failed. Please check your credentials.");
          setLoading(false);
          return;
        }

        // ✅ Staff email bilgisini sakla
        localStorage.setItem("staffEmail", email);

        // ✅ İstersen staff adı da saklanır
        if (data.staff && data.staff.name) {
          localStorage.setItem("staffName", data.staff.name);
        }

        setMessage("Login successful. Redirecting...", "success");

        setTimeout(() => {
          const redirectUrl = data.redirect || "/staff-logins/staff-dashboard.html";
          window.location.href = redirectUrl + "?email=" + encodeURIComponent(email);
        }, 800);

      } catch (error) {
        console.error("Staff login error:", error);
        setMessage("Server connection failed.");
        setLoading(false);
      }
    });
  </script>
</body>
</html>
