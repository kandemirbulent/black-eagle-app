<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activate Account</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #eef0f3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 92%;
      max-width: 450px;
      background: white;
      padding: 25px 20px;
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: #333;
    }

    .form-label {
      display: flex;
      flex-direction: column;
      font-size: 0.9rem;
      font-weight: 600;
      color: #444;
      margin-bottom: 12px;
    }

    input {
      margin-top: 5px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      background: #fafafa;
    }

    input:focus {
      border-color: #007bff;
      outline: none;
      box-shadow: 0 0 4px rgba(0,123,255,0.4);
    }

    .button {
      width: 100%;
      padding: 14px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      margin-top: 15px;
    }

    .button:hover {
      background: #005fcc;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Activate Your Account</h1>

    <!-- PASSWORD SECTION -->
    <label class="form-label">Create Password:
      <input type="password" id="password">
    </label>

    <label class="form-label">Confirm Password:
      <input type="password" id="confirmPassword">
    </label>

    <hr style="margin: 20px 0; opacity: 0.4;">

    <h1 style="font-size:1.3rem;">Bank Details</h1>

    <label class="form-label">Account Holder Name:
      <input type="text" id="accountHolder">
    </label>

    <label class="form-label">Bank Name:
      <input type="text" id="bankName">
    </label>

    <label class="form-label">Sort Code:
      <input type="text" id="sortCode">
    </label>

    <label class="form-label">Account Number:
      <input type="text" id="accountNumber">
    </label>

    <label class="form-label">IBAN (optional):
      <input type="text" id="iban">
    </label>

    <button class="button" id="activateBtn">Complete Activation</button>
  </div>

  <script>
    document.getElementById("activateBtn").addEventListener("click", function () {

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const accountHolder = document.getElementById("accountHolder").value;
      const bankName = document.getElementById("bankName").value;
      const sortCode = document.getElementById("sortCode").value;
      const accountNumber = document.getElementById("accountNumber").value;
      const iban = document.getElementById("iban").value;

      if (password !== confirmPassword) {
        alert("Passwords do not match.");
        return;
      }

      const activationData = {
        token: "TOKEN_FROM_URL",
        password: password,
        bank_details: {
          account_holder: accountHolder,
          bank_name: bankName,
          sort_code: sortCode,
          account_number: accountNumber,
          iban: iban
        }
      };

      console.log("Activation payload:", activationData);

      alert("Activation completed! Redirecting to dashboard...");
    });
  </script>

</body>
</html>
