<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Forgot Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #111827;
    }

    .card {
      width: min(420px, calc(100vw - 32px));
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }

    p {
      margin: 0 0 20px;
      color: #4b5563;
      line-height: 1.5;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 16px;
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: #111827;
      color: #fff;
    }

    button:disabled {
      opacity: 0.7;
      cursor: wait;
    }

    .status {
      min-height: 22px;
      margin-top: 16px;
      font-size: 14px;
    }

    .status.error {
      color: #b91c1c;
    }

    .status.success {
      color: #047857;
    }

    .back {
      display: inline-block;
      margin-top: 16px;
      color: #111827;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Staff Password Reset</h1>
    <p>Enter your staff email address. If your account is active, we will send you a secure reset link.</p>

    <form id="forgotForm">
      <label for="email">Staff Email</label>
      <input type="email" id="email" required autocomplete="email">
      <button type="submit" id="submitBtn">Send Reset Link</button>
    </form>

    <div id="status" class="status"></div>
    <a class="back" href="/staff-logins/staff-login.html">Back to Staff Login</a>
  </div>

  <script>
    const form = document.getElementById("forgotForm");
    const emailInput = document.getElementById("email");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("status");

    function setStatus(message, type = "") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`.trim();
    }

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      submitBtn.textContent = isLoading ? "Sending..." : "Send Reset Link";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = emailInput.value.trim().toLowerCase();

      if (!email) {
        setStatus("Please enter your staff email.", "error");
        return;
      }

      try {
        setLoading(true);
        setStatus("");

        const res = await fetch("/api/staff/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email }),
        });

        const data = await res.json().catch(() => ({}));
        setStatus(
          data.message || "If this email exists, a reset link has been sent.",
          res.ok ? "success" : "error"
        );
      } catch (error) {
        console.error("Staff forgot password error:", error);
        setStatus("Could not send reset link. Please try again.", "error");
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
